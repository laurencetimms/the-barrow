name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build terrain
        run: npm run build -w @the-barrow/terrain
      - name: Build voice
        run: npm run build -w @the-barrow/voice
      - name: Build game
        run: npm run build:game
      - name: Build terrain viewer
        run: npm run build:terrain-viewer
      - name: Build voice tester
        run: npm run build:voice-tester
      - name: Combine builds
        run: |
          mkdir -p combined
          cp -r packages/game/dist/* combined/
          mkdir -p combined/terrain
          cp -r packages/terrain-viewer/dist/* combined/terrain/
          mkdir -p combined/voice
          cp -r packages/voice-tester/dist/* combined/voice/
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "combined"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
