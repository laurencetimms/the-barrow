<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Barrow</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1c1a17;
      color: #c4b9a8;
      font-family: 'EB Garamond', Georgia, serif;
      height: 100vh;
      overflow: hidden;
    }

    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }

    .start-screen h1 {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8a8078;
    }

    .start-screen .tagline {
      font-size: 15px;
      color: #5a5248;
      font-style: italic;
      margin-bottom: 20px;
    }

    .start-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .start-controls input {
      background: #2a2620;
      border: 1px solid #3a3630;
      color: #c4b9a8;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      width: 160px;
      border-radius: 4px;
    }

    .start-controls button {
      background: #2e2a22;
      border: 1px solid #5a5040;
      color: #b8a88a;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
    }

    .start-controls button:hover { background: #3e3a32; }

    /* ─── Game layout ─── */
    .game-layout {
      display: none;
      height: 100vh;
    }

    .game-layout.active {
      display: flex;
    }

    .map-panel {
      width: 400px;
      min-width: 300px;
      border-right: 1px solid #2a2620;
      display: flex;
      flex-direction: column;
    }

    .map-panel canvas {
      flex: 1;
      width: 100%;
    }

    .text-game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #status {
      padding: 8px 24px;
      font-size: 12px;
      color: #5a5248;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2a2620;
    }

    #text-panel {
      flex: 1;
      padding: 32px 36px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #text-panel p {
      font-size: 19px;
      line-height: 1.75;
      color: #d4caba;
      max-width: 520px;
    }

    #text-panel .generating {
      color: #5a5248;
      font-style: italic;
      font-size: 14px;
    }

    #choices {
      padding: 16px 36px 24px;
      border-top: 1px solid #2a2620;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .choice-btn {
      background: #222018;
      border: 1px solid #3a3630;
      color: #b0a890;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
      border-radius: 4px;
      text-align: left;
      transition: all 0.15s;
    }

    .choice-btn:hover {
      background: #2e2a22;
      border-color: #5a5040;
      color: #d4c4a0;
    }

    @media (max-width: 768px) {
      .game-layout.active { flex-direction: column; }
      .map-panel { width: 100%; height: 200px; min-width: auto; border-right: none; border-bottom: 1px solid #2a2620; }
    }
  </style>
</head>
<body>
  <div class="start-screen" id="start-screen">
    <h1>The Barrow</h1>
    <p class="tagline">You emerge from the dark into daylight.</p>
    <div class="start-controls">
      <input type="text" id="seed" placeholder="World seed" value="barrow" />
      <button id="start-btn">Begin</button>
    </div>
  </div>

  <div class="game-layout" id="game-layout">
    <div class="map-panel">
      <canvas id="map"></canvas>
    </div>
    <div class="text-game-panel">
      <div id="status"></div>
      <div id="text-panel"></div>
      <div id="choices"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
