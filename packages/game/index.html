<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Barrow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      scrollbar-width: none;
      background: #1c1a17;
      color: #d4caba;
      font-family: 'EB Garamond', Georgia, serif;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      display: none;
    }

    /* ─── Start screen ──────────────────────────────────────── */

    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }

    #start-screen h1 {
      font-size: 20px;
      font-weight: 400;
      font-variant: small-caps;
      letter-spacing: 0.2em;
      color: #8a8078;
    }

    #start-screen .tagline {
      font-size: 16px;
      font-style: italic;
      color: #5a5248;
    }

    .start-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .start-controls input {
      background: #242018;
      border: 1px solid #3a3630;
      color: #d4caba;
      padding: 8px 14px;
      font-family: inherit;
      font-size: 15px;
      width: 160px;
      outline: none;
      transition: border-color 0.15s;
    }

    .start-controls input:focus {
      border-color: #5a5040;
    }

    .start-controls button {
      background: transparent;
      border: 1px solid #4a4438;
      color: #9a9080;
      padding: 8px 22px;
      font-family: inherit;
      font-size: 15px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .start-controls button:hover {
      color: #d4caba;
      border-color: #6a6050;
    }

    /* ─── Game layout ───────────────────────────────────────── */

    #game-layout {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Status line — top of text panel; starts invisible (JS reveals after opening) */
    #status {
      flex-shrink: 0;
      padding: 10px 48px;
      max-width: 636px; /* 540px text + 48px each side */
      margin: 0 auto;
      width: 100%;
      font-size: 11px;
      color: #5a5248;
      letter-spacing: 0.04em;
      opacity: 0;
    }

    /* Scrollable prose area */
    #text-panel {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 16px 0 24px;
    }

    #text-panel::-webkit-scrollbar {
      display: none;
    }

    #text-panel p {
      max-width: 540px;
      margin: 0 auto;
      padding: 0 48px;
      font-size: 19px;
      line-height: 1.75;
      color: #d4caba;
    }

    #text-panel p + p {
      margin-top: 1.1em;
    }

    #text-panel p.generating {
      font-style: italic;
      font-size: 15px;
      color: #5a5248;
    }

    /* Choices — below prose, fade in */
    #choices {
      flex-shrink: 0;
      max-width: 540px;
      width: 100%;
      margin: 0 auto;
      padding: 36px 48px 44px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
    }

    #choices button {
      background: none;
      border: none;
      color: #b0a890;
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      padding: 1px 0;
      transition: color 0.15s;
    }

    #choices button:hover {
      color: #d4c4a0;
    }

    /* Memory map placeholder — top-right corner; starts invisible (JS reveals after opening) */
    #map-placeholder {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 180px;
      height: 180px;
      background: #0d0c0a;
      border: 1px solid #2e2a24;
      pointer-events: none;
      opacity: 0;
    }

    /* Mobile */
    @media (max-width: 768px) {
      #status {
        padding: 10px 24px;
        max-width: 100%;
      }

      #text-panel p {
        padding: 0 24px;
      }

      #choices {
        padding: 36px 24px 44px;
      }

      #map-placeholder {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Start screen -->
  <div id="start-screen">
    <h1>The Barrow</h1>
    <p class="tagline">You emerge from the dark into daylight.</p>
    <div class="start-controls">
      <input type="text" id="seed" placeholder="World seed" value="barrow" />
      <button id="start-btn">Begin</button>
    </div>
  </div>

  <!-- Game -->
  <div id="game-layout">
    <div id="status"></div>
    <div id="text-panel"></div>
    <div id="choices"></div>
    <div id="map-placeholder"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
